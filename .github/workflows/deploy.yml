name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: production

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        run: |
          : "${AWS_REGION:?Set AWS_REGION in the production environment variables}"
          : "${AWS_ROLE_ARN:?Set AWS_ROLE_ARN in the production environment variables}"
          : "${S3_BUCKET:?Set S3_BUCKET in the production environment variables}"

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and test
        run: nix develop --command just check

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

      - name: Upload site assets
        run: nix develop --command aws s3 sync web "s3://${S3_BUCKET}" --delete
